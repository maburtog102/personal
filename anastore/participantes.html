<!DOCTYPE html>
<html lang="es">
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Participantes</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        #BackFondo {
            position: fixed;
            width: 100%;
            height: 100%;
            top: -20px;
            left: 0;
            z-index: -100;
            opacity: 0.6;
        }

        .titulo {
            background-color: rgb(187 22 217 / 60%);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin: 20px auto 10px auto;
            text-align: center;
            max-width: 600px;
        }

        .tabla-contenedor {
            max-height: calc(100vh - 220px); /* Ajusta según el espacio que ocupa el título/márgenes */
            overflow-y: auto;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        table {
            margin: 0;
        }
        table#tablaPersonas tbody tr td {
    background-color: rgb(255 255 255 / 40%);
    font-weight: bold;
}
.container {
    max-width: 1100px;
}

 @media only screen and (max-width: 768px) {
    div#counter {
    margin-top: 617px !important;
    zoom: 0.5 !important;
}
#Triste img{
 width: 180px !important;
}
#lblNombreGanador{
display: block !important;
}
div#InfoGanador {
    box-shadow: inset 0px 5px 10px 2px rgb(0 0 0 / 30%);
    background-color: #fff;
    border: 5px #fff solid;
    height: 70px !important;
    position: absolute;
    margin-top: -120px !important;
    overflow-x: hidden;
    width: -webkit-fill-available;
    overflow-y: inherit;
}

div#InfoGanador span {
    font-size: 60px !important;    
    font-family: monospace !important;
}
div#Winwrapper {
      margin-top: 60px !important;
}
div#Winwrapper span{
font-size: 80px !important;
}
    }
    </style>
</head>
<body>

    <!-- Fondo -->
    <img id="BackFondo" src="fondo.jpg" alt="Fondo" />

    <div class="container">
        <div class="titulo">
            <h3>Lista de Participantes</h3>
        </div>

        <div class="tabla-contenedor">
            <table class="table table-bordered table-striped mb-0" id="tablaPersonas">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Se llenará dinámicamente -->
                </tbody>
            </table>
        </div>
       <div style="width: 100%; text-align: center; margin-top: 20px;"><a id="btnSortear" href="#" class="btn btn-danger" style=" font-size: 21px;"><span class="fa fa-door"></span>Sortear</a></div>
    </div>

    <!-- jQuery -->
    <script src="js/jquery-3.6.1.min.js"></script>

    <script>
        let personas = [];

        function cargarPersonas(callback) {
            $.getJSON("participantes.json", function(data) {
                personas = data;
                callback(data);
            });
        }

        $(document).ready(function () {

             if($(window).width() <= 768)  $('#BackFondo').attr('src','fondo_movil.jpg');

             
            const baseUri = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '');
 $('#btnSortear').attr('href',  `${baseUri}/index.html`);

            cargarPersonas(function (data) {
                let tbody = $('#tablaPersonas tbody');
                tbody.empty();

                data.forEach(function (persona) {
                    let fila = `<tr>
                                    <td>${persona.Nombre}</td>
                                    <td>${persona.Telefono}</td>
                                </tr>`;
                    tbody.append(fila);
                });
            });
        });
    </script>

</body>
</html>
