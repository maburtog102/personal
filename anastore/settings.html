        const hex2rgb = (hex) => {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);

    // return {r, g, b}
    return { r, g, b };
}
const hex2rgbStr = (hex, opacity) => {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);

    // return {r, g, b}
    return `rgb(${r} ,${g} ,${b},${opacity})`;
}

  function setValue(id, value) {
    if (value !== undefined && value !== null) {
      const $el = $("#" + id);
      if ($el.length > 0) {
        if ($el.is(":checkbox")) {
          $el.prop("checked", value);
        } else {
          $el.val(value);
        }
      }
    }
  }

 function aplicarValoresDesdeConfig(_config) {
    // Fondo
    setValue("imagenFondo", _config.fondo?.imagen);
    setValue("fondoOpacity", _config.fondo?.opacidad * 100); // Convertir a porcentaje (0-100)
    setValue("colorFondo", _config.fondo?.color); // Assuming 'color' was meant for 'colorFondo'

    // Botón Iniciar
    setValue("btnIniciarColor", _config.botonIniciar?.color);
    setValue("btnIniciarFondoColor", _config.botonIniciar?.fondo?.color);
    setValue("btnIniciarFondoOpacidad", _config.botonIniciar?.fondo?.opacidad);
    setValue("btnIniciarOpacidad", _config.botonIniciar?.opacidad);
    setValue("btnIniciarSombraColor", _config.botonIniciar?.sombra?.color);
    setValue("btnIniciarSombraOpacidad", _config.botonIniciar?.sombra?.opacidad);

    // Botón Detener
    setValue("btnDetenerColor", _config.botonDetener?.color);
    setValue("btnDetenerFondoColor", _config.botonDetener?.fondo?.color);
    setValue("btnDetenerFondoOpacidad", _config.botonDetener?.fondo?.opacidad);
    setValue("btnDetenerOpacidad", _config.botonDetener?.opacidad);
    setValue("btnDetenerSombraColor", _config.botonDetener?.sombra?.color);

    setValue("deteniendoColor", _config.etiquetaDeteniendo?.color);
    setValue("deteniendoOpacidad", _config.etiquetaDeteniendo?.opacidad);
