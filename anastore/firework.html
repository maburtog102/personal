<html><head>
    <meta charset="utf-8">
    <title></title>
    <style>
    html,* { margin:0; padding:0}
    body { width:100%; height:100%;}
    .demo { margin:0 auto; width:100%; height:100%;}
    h1 { margin:150px auto 30px auto; text-align:center; font-family:'Roboto';}
    </style>
    </head>
    
    <body>
     <div class="demo">
    <canvas id="fireworksField" width="811" height="649" style="position: absolute; top: 0px; left: 0px; opacity: 0.9;"></canvas></div>
    <script src="js/jquery-3.6.1.min.js"></script>
    <script src="js/jquery.fireworks.js"></script>
    <script>
    $('.demo').fireworks({
       // sound: true, opacity: 1, width: '100%', height: '100%' 
       autoresize: true,
       opacity: 1,
  sound: true,
  background:{
    size:'cover',
    color:'#ffffff',
  },
  acceleration: 1.02,
  friction: 0.97,
  gravity: 1.5,
  particles: 60,
  traceLength: 3,
  traceSpeed: 10,
  explosion: 5,
  intensity: 30,
  flickering: 50,
  lineStyle: 'round',
  hue: {
    min: 0,
    max: 345
  },
  delay: {
    min: 30,
    max: 60
  },
  rocketsPoint: {
    min: 50,
    max: 50
  },
  lineWidth: {
    explosion: {
      min: 1,
      max: 4
    },
    trace: {
      min: 0.10,
      max: 1
    }
  },
  brightness: {
    min: 50,
    max: 80
  },
  decay: {
    min: 0.015,
    max: 0.03
  },
  mouse: {
    click: true,
    move: true,
    max: 1
  }
    });
    </script>
    
    
    
    </body></html>
